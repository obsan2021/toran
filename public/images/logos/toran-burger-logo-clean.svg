<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      .bg { fill: #ED1C24; }
      .circle { fill: #FFFFFF; }
      .text-main { fill: #ED1C24; font-family: Arial, sans-serif; font-weight: bold; font-size: 60px; }
      .text-sub { fill: #FFFFFF; font-family: Arial, sans-serif; font-weight: bold; font-size: 24px; }
      .burger-top { fill: #FBB040; }
      .burger-patty { fill: #5C3A21; }
      .burger-lettuce { fill: #39B54A; }
      .burger-cheese { fill: #FBB040; }
    </style>
  </defs>
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="#ED1C24" />
  <circle cx="200" cy="200" r="175" fill="#FFFFFF" />
  <!-- Burger icon -->
  <g transform="translate(200, 175)">
    <!-- Top bun -->
    <ellipse cx="0" cy="-20" rx="70" ry="30" fill="#FBB040" />
    <ellipse cx="0" cy="-25" rx="60" ry="25" fill="#F5A623" />
    <!-- Lettuce -->
    <ellipse cx="0" cy="-8" rx="65" ry="12" fill="#39B54A" />
    <!-- Cheese -->
    <ellipse cx="0" cy="2" rx="60" ry="8" fill="#FBB040" />
    <!-- Patty -->
    <ellipse cx="0" cy="12" rx="62" ry="15" fill="#5C3A21" />
    <ellipse cx="0" cy="14" rx="55" ry="10" fill="#4A2C1A" />
    <!-- Bottom bun -->
    <ellipse cx="0" cy="28" rx="65" ry="12" fill="#F5A623" />
    <rect x="-65" y="20" width="130" height="10" fill="#FBB040" />
    <ellipse cx="0" cy="30" rx="65" ry="15" fill="#FBB040" />
  </g>
  <!-- Text -->
  <text x="200" y="280" text-anchor="middle" class="text-main">TORAN</text>
  <text x="200" y="315" text-anchor="middle" class="text-sub">BURGER</text>
  <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ED1C24">EST. 2023</text>
</svg>
